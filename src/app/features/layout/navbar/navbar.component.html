<nav class="rv-nav navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-3 px-md-4">
    <a class="navbar-brand rv-brand" routerLink="/" (click)="isMenuOpen=false">
      <span class="brand-mark">R</span>
      <span class="brand-text">RevHire</span>
    </a>

    <button class="navbar-toggler" type="button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav me-auto mb-3 mb-lg-0 rv-links">
        <ng-container *ngIf="!authService.isAuthenticated()">
          <li class="nav-item"><a class="nav-link" routerLink="/jobs" routerLinkActive="active" (click)="isMenuOpen=false">Find Jobs</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/" routerLinkActive="active" (click)="isMenuOpen=false">For Employers</a></li>
        </ng-container>

        <ng-container *ngIf="authService.isAuthenticated() && authService.isJobSeeker()">
          <li class="nav-item"><a class="nav-link" routerLink="/seeker/dashboard" routerLinkActive="active" (click)="isMenuOpen=false">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/jobs" routerLinkActive="active" (click)="isMenuOpen=false">Jobs</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/seeker/resume-builder" routerLinkActive="active" (click)="isMenuOpen=false">Resume</a></li>
        </ng-container>

        <ng-container *ngIf="authService.isAuthenticated() && authService.isEmployer()">
          <li class="nav-item"><a class="nav-link" routerLink="/employer/dashboard" routerLinkActive="active" (click)="isMenuOpen=false">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/employer/post-job" routerLinkActive="active" (click)="isMenuOpen=false">Post Job</a></li>
        </ng-container>
      </ul>

      <div class="rv-actions d-flex align-items-center gap-2">
        <button class="btn btn-sm rv-theme-btn" (click)="themeService.toggleTheme()" aria-label="Toggle Theme">
          <svg *ngIf="!themeService.isDarkMode()" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <svg *ngIf="themeService.isDarkMode()" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>

        <ng-container *ngIf="!authService.isAuthenticated(); else userMenu">
          <a class="btn btn-sm btn-outline-light" routerLink="/auth/login" (click)="isMenuOpen=false">Log In</a>
          <a class="btn btn-sm btn-primary" routerLink="/auth/register" (click)="isMenuOpen=false">Sign Up</a>
        </ng-container>

        <ng-template #userMenu>
          <a class="btn btn-sm rv-chat" routerLink="/chat" (click)="isMenuOpen=false">Chat</a>

          <div class="position-relative">
            <button class="btn rv-avatar-btn" (click)="toggleProfileMenu()">
              <span class="rv-avatar">{{ (authService.currentUser()?.name)?.charAt(0) || 'U' | uppercase }}</span>
              <span class="d-none d-md-inline text-truncate" style="max-width: 130px;">{{ authService.currentUser()?.name }}</span>
            </button>

            <div *ngIf="isProfileMenuOpen" class="rv-menu dropdown-menu dropdown-menu-end show">
              <div class="px-3 py-2 border-bottom small">
                <div class="fw-bold text-truncate">{{ authService.currentUser()?.name }}</div>
                <div class="text-secondary text-truncate">{{ authService.currentUser()?.email }}</div>
              </div>

              <a class="dropdown-item" [routerLink]="authService.isJobSeeker() ? '/seeker/profile' : '/employer/profile'" (click)="closeProfileMenu()">Profile</a>
              <a *ngIf="authService.isJobSeeker()" class="dropdown-item" routerLink="/seeker/dashboard" (click)="closeProfileMenu()">Applied Jobs</a>
              <a *ngIf="authService.isJobSeeker()" class="dropdown-item" routerLink="/seeker/resume-builder" (click)="closeProfileMenu()">Resume Builder</a>
              <a class="dropdown-item" routerLink="/chat" (click)="closeProfileMenu()">Messages</a>
              <button class="dropdown-item" (click)="changePassword()">Change Password</button>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item text-danger" (click)="logout()">Logout</button>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
