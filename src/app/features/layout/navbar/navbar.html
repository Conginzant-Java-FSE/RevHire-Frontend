<nav class="navbar navbar-expand-md navbar-dark sticky-top shadow-sm transition-colors py-4"
    style="background-color: #1e293b;">
    <div class="container-fluid max-w-7xl px-3 px-md-5">
        
        <a class="navbar-brand d-flex align-items-center gap-3 text-primary" routerLink="/"
            style="font-family: 'Montserrat', 'Segoe UI', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; text-transform: uppercase;">
            <svg style="width: 36px; height: 36px;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" />
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            RevHire
        </a>

       
        <button class="navbar-toggler border-0" type="button" (click)="toggleMenu()" aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        
        <div class="collapse navbar-collapse" [class.show]="isMenuOpen">

          
            <ul class="navbar-nav me-auto mb-2 mb-md-0 ms-md-5 ps-md-4 gap-md-4">
                <ng-container *ngIf="!authService.isAuthenticated()">
                   
                    <li class="nav-item">
                        <a class="nav-link fs-5" routerLink="/auth/login"
                            routerLinkActive="active fw-bold text-primary">Find
                            Jobs</a>
                    </li>
                </ng-container>

                <ng-container *ngIf="authService.isAuthenticated()">
                    <ng-container *ngIf="authService.isJobSeeker()">
                        <li class="nav-item">
                            <a class="nav-link fs-5" routerLink="/seeker/dashboard"
                                routerLinkActive="active fw-bold text-primary">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fs-5" routerLink="/jobs"
                                routerLinkActive="active fw-bold text-primary">Find
                                Jobs</a>
                        </li>
                    </ng-container>

                    <ng-container *ngIf="authService.isEmployer()">
                        <li class="nav-item">
                            <a class="nav-link fs-5" routerLink="/employer/dashboard"
                                routerLinkActive="active fw-bold text-primary">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fs-5" routerLink="/employer/post-job"
                                routerLinkActive="active fw-bold text-primary">Post a Job</a>
                        </li>
                    </ng-container>
                </ng-container>
            </ul>

           
            <div class="d-flex align-items-center gap-3">
                
                <button class="btn btn-link text-light p-0 border-0" (click)="themeService.toggleTheme()"
                    aria-label="Toggle Theme">
                    <svg *ngIf="!themeService.isDarkMode()" style="width: 20px; height: 20px;" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                    <svg *ngIf="themeService.isDarkMode()" style="width: 20px; height: 20px;" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>

                
                <div class="ms-md-4 d-flex align-items-center gap-2">
                    <ng-container *ngIf="authService.isAuthenticated(); else unauthMenu">
                       
                        <div class="position-relative ms-2">
                            <button
                                class="btn btn-link text-decoration-none d-flex align-items-center gap-2 p-0 border-0"
                                (click)="toggleProfileMenu()" style="outline: none;">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                                    style="width: 36px; height: 36px; font-size: 1.1rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">
                                    {{ (authService.currentUser()?.name)?.charAt(0) || 'U' | uppercase }}
                                </div>
                                <span class="text-light fw-medium small d-none d-md-block">
                                    {{ authService.currentUser()?.name }}
                                </span>
                                <svg style="width: 16px; height: 16px; margin-left: -4px;"
                                    class="text-light d-none d-md-block opacity-75" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>

                           
                            <div *ngIf="isProfileMenuOpen"
                                class="dropdown-menu dropdown-menu-end show position-absolute mt-3 shadow-lg border-0 rounded-3 py-2"
                                style="right: 0; min-width: 220px; z-index: 1050; animation: fadeIn 0.15s ease-out;"
                                [class.bg-dark]="themeService.isDarkMode()" [class.border]="themeService.isDarkMode()"
                                [class.border-secondary]="themeService.isDarkMode()">

                                <div class="px-3 py-2 border-bottom mb-2"
                                    [class.border-secondary]="themeService.isDarkMode()">
                                    <p class="mb-0 fw-bold" [class.text-white]="themeService.isDarkMode()">{{
                                        authService.currentUser()?.name }}</p>
                                    <p class="mb-0 small text-secondary text-truncate">{{
                                        authService.currentUser()?.email }}</p>
                                </div>

                                <a class="dropdown-item py-2 d-flex align-items-center gap-3 text-decoration-none"
                                    [class.text-white]="themeService.isDarkMode()"
                                    [routerLink]="authService.isJobSeeker() ? '/seeker/profile' : '/employer/profile'"
                                    (click)="closeProfileMenu()">
                                    <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                    Edit Profile
                                </a>

                                <a *ngIf="authService.isJobSeeker()"
                                    class="dropdown-item py-2 d-flex align-items-center gap-3 text-decoration-none"
                                    [class.text-white]="themeService.isDarkMode()" routerLink="/seeker/dashboard"
                                    (click)="closeProfileMenu()">
                                    <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                    Applied Jobs
                                </a>

                                <a *ngIf="authService.isJobSeeker()"
                                    class="dropdown-item py-2 d-flex align-items-center gap-3 text-decoration-none"
                                    [class.text-white]="themeService.isDarkMode()" routerLink="/seeker/resume-builder"
                                    (click)="closeProfileMenu()">
                                    <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                    Resume Builder
                                </a>

                                <a class="dropdown-item py-2 d-flex align-items-center gap-3 text-decoration-none"
                                    [class.text-white]="themeService.isDarkMode()" routerLink="/chat"
                                    (click)="closeProfileMenu()">
                                    <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M8 10h8M8 14h6m7 6l-3.5-3.5H6a2 2 0 01-2-2V6a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2z" />
                                    </svg>
                                    Messages
                                </a>

                                <button
                                    class="dropdown-item py-2 d-flex align-items-center gap-3 border-0 bg-transparent text-start w-100"
                                    [class.text-white]="themeService.isDarkMode()"
                                    (click)="changePassword()">
                                    <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                    </svg>
                                    Change Password
                                </button>

                                <div class="dropdown-divider my-2" [class.border-secondary]="themeService.isDarkMode()">
                                </div>

                                <button
                                    class="dropdown-item py-2 d-flex align-items-center gap-3 text-danger border-0 bg-transparent text-start w-100 fw-medium"
                                    (click)="logout()">
                                    <svg style="width: 18px; height: 18px;" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                    Logout
                                </button>
                            </div>
                        </div>
                    </ng-container>

                    <ng-template #unauthMenu>
                        <a class="btn btn-outline-primary btn-sm px-3" routerLink="/auth/login"
                            (click)="isMenuOpen=false">Log In</a>
                        <a class="btn btn-primary btn-sm px-3" routerLink="/auth/register"
                            (click)="isMenuOpen=false">Sign
                            Up</a>
                    </ng-template>
                </div>
            </div>
        </div>
    </div>
</nav>
